components:
  schemas:
    ABIErrorPayload:
      additionalProperties: false
      properties:
        code:
          "$ref": "#/components/schemas/PartoutErrorCode"
        userInfo: {}
      required:
        - code
      type: object
    Address:
      type: string
      description: A hostname or IP address.
    ConnectionStatus:
      enum:
        - disconnected
        - connecting
        - connected
        - disconnecting
      type: string
      x-enum-varnames:
        - disconnected
        - connecting
        - connected
        - disconnecting
      description: The status of a ``Connection``.
    CustomModule:
      additionalProperties: false
      properties:
        innerType:
          "$ref": "#/components/schemas/ModuleType"
        json: {}
      required:
        - innerType
        - json
      type: object
      description: A type-erased ``Module`` for encoding external implementations.
    DNSModule:
      additionalProperties: false
      properties:
        domainName:
          "$ref": "#/components/schemas/Address"
        domainPolicy:
          "$ref": "#/components/schemas/DNSModule.DomainPolicy"
        id:
          "$ref": "#/components/schemas/UniqueID"
        inheritsVPN:
          type: boolean
        protocolType:
          "$ref": "#/components/schemas/DNSModule.ProtocolType"
        routesThroughVPN:
          type: boolean
        searchDomains:
          items:
            "$ref": "#/components/schemas/Address"
          type: array
        servers:
          items:
            "$ref": "#/components/schemas/Address"
          type: array
      required:
        - id
        - protocolType
        - servers
      type: object
      description: DNS settings.
    DNSModule.DomainPolicy:
      enum:
        - match
        - matchAndSearch
      type: string
      x-enum-varnames:
        - match
        - matchAndSearch
    DNSModule.ProtocolType:
      discriminator:
        mapping:
          cleartext: "#/components/schemas/DNSModule.ProtocolType.cleartext"
          https: "#/components/schemas/DNSModule.ProtocolType.https"
          tls: "#/components/schemas/DNSModule.ProtocolType.tls"
        propertyName: type
      properties:
        type:
          type: string
      required:
        - type
      type: object
    DNSModule.ProtocolType.cleartext:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/DNSModule.ProtocolType"
      properties:
        type:
          const: cleartext
          type: string
      required:
        - type
      type: object
    DNSModule.ProtocolType.https:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/DNSModule.ProtocolType"
      properties:
        type:
          const: https
          type: string
        url:
          format: uri
          type: string
      required:
        - type
        - url
      type: object
    DNSModule.ProtocolType.tls:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/DNSModule.ProtocolType"
      properties:
        hostname:
          type: string
        type:
          const: tls
          type: string
      required:
        - type
        - hostname
      type: object
    DNSProtocol:
      enum:
        - cleartext
        - https
        - tls
      type: string
      x-enum-varnames:
        - cleartext
        - https
        - tls
      description: The protocol used in DNS servers.
      x-enum-descriptions:
        - The value to fall back to when unset. Standard cleartext DNS (port 53).
        - DNS over HTTPS.
        - DNS over TLS (port 853).
    DataCount:
      additionalProperties: false
      properties:
        received:
          "$ref": "#/components/schemas/UInt64"
          description: Received bytes count.
        sent:
          "$ref": "#/components/schemas/UInt64"
          description: Sent bytes count.
      required:
        - received
        - sent
      type: object
      description: A pair of received/sent bytes count.
    Endpoint:
      type: string
      description: Represents an endpoint.
    EndpointProtocol:
      type: string
      description: Defines the communication protocol of an endpoint.
    ExtendedEndpoint:
      type: string
      description: Aggregates an address and an ``EndpointProtocol``.
    HTTPProxyModule:
      additionalProperties: false
      properties:
        bypassDomains:
          items:
            "$ref": "#/components/schemas/Address"
          type: array
        id:
          "$ref": "#/components/schemas/UniqueID"
        pacURL:
          format: uri
          type: string
        proxy:
          "$ref": "#/components/schemas/Endpoint"
        secureProxy:
          "$ref": "#/components/schemas/Endpoint"
      required:
        - id
        - bypassDomains
      type: object
      description: HTTP proxy settings.
    IPModule:
      additionalProperties: false
      properties:
        id:
          "$ref": "#/components/schemas/UniqueID"
        ipv4:
          "$ref": "#/components/schemas/IPSettings"
        ipv6:
          "$ref": "#/components/schemas/IPSettings"
        mtu:
          type: integer
      required:
        - id
      type: object
      description: IP and routes.
    IPSettings:
      additionalProperties: false
      properties:
        excludedRoutes:
          items:
            "$ref": "#/components/schemas/Route"
          type: array
          description: The excluded routes.
        includedRoutes:
          items:
            "$ref": "#/components/schemas/Route"
          type: array
          description: The included routes.
        subnets:
          items:
            "$ref": "#/components/schemas/Subnet"
          type: array
          description: The subnets.
      required:
        - subnets
        - includedRoutes
        - excludedRoutes
      type: object
      description: IP settings and routes.
    IPSocketType:
      enum:
        - UDP
        - TCP
        - UDP4
        - TCP4
        - UDP6
        - TCP6
      type: string
      x-enum-varnames:
        - udp
        - tcp
        - udp4
        - tcp4
        - udp6
        - tcp6
      description: A socket type with optional info about the IP endpoint.
      x-enum-descriptions:
        - UDP socket type.
        - TCP socket type.
        - UDP socket type (IPv4).
        - TCP socket type (IPv4).
        - UDP socket type (IPv6).
        - TCP socket type (IPv6).
    Int16:
      type: integer
    Int32:
      type: integer
    Int64:
      format: int64
      type: integer
    Int8:
      type: integer
    ModuleType:
      enum:
        - Custom
        - DNS
        - HTTPProxy
        - IP
        - OnDemand
        - OpenVPN
        - Provider
        - WireGuard
        - Undefined
      type: string
      x-enum-varnames:
        - Custom
        - DNS
        - HTTPProxy
        - IP
        - OnDemand
        - OpenVPN
        - Provider
        - WireGuard
        - Undefined
      description: Raw type univocally associated to each ``Module`` implementation.
    OnDemandModule:
      additionalProperties: false
      properties:
        id:
          "$ref": "#/components/schemas/UniqueID"
        policy:
          "$ref": "#/components/schemas/OnDemandModule.Policy"
        withOtherNetworks:
          items:
            "$ref": "#/components/schemas/OnDemandModule.OtherNetwork"
          type: array
          uniqueItems: true
        withSSIDs:
          additionalProperties:
            type: boolean
          type: object
      required:
        - id
        - policy
        - withSSIDs
        - withOtherNetworks
      type: object
      description: On-demand settings.
    OnDemandModule.OtherNetwork:
      enum:
        - mobile
        - ethernet
      type: string
      x-enum-varnames:
        - mobile
        - ethernet
    OnDemandModule.Policy:
      enum:
        - any
        - including
        - excluding
      type: string
      x-enum-varnames:
        - any
        - including
        - excluding
    OpenVPN.Cipher:
      enum:
        - "AES-128-CBC"
        - "AES-192-CBC"
        - "AES-256-CBC"
        - "AES-128-GCM"
        - "AES-192-GCM"
        - "AES-256-GCM"
      type: string
      x-enum-varnames:
        - aes128cbc
        - aes192cbc
        - aes256cbc
        - aes128gcm
        - aes192gcm
        - aes256gcm
      description: Encryption algorithm.
      x-enum-descriptions:
        - AES encryption with 128-bit key size and CBC.
        - AES encryption with 192-bit key size and CBC.
        - AES encryption with 256-bit key size and CBC.
        - AES encryption with 128-bit key size and GCM.
        - AES encryption with 192-bit key size and GCM.
        - AES encryption with 256-bit key size and GCM.
    OpenVPN.CompressionAlgorithm:
      enum:
        - 0
        - 1
        - 2
      type: integer
      x-enum-varnames:
        - disabled
        - LZO
        - other
      description: Defines the type of compression algorithm.
    OpenVPN.CompressionFraming:
      enum:
        - 0
        - 1
        - 2
        - 3
      type: integer
      x-enum-varnames:
        - disabled
        - compLZO
        - compress
        - compressV2
      description: Defines the type of compression framing.
    OpenVPN.Configuration:
      additionalProperties: false
      properties:
        authToken:
          type: string
          description: "- Seealso: `Configuration.Builder.authToken`"
        authUserPass:
          type: boolean
          description: "- Seealso: `Configuration.Builder.authUserPass`"
        ca:
          "$ref": "#/components/schemas/OpenVPN.CryptoContainer"
          description: "- Seealso: `Configuration.Builder.ca`"
        checksEKU:
          type: boolean
          description: "- Seealso: `Configuration.Builder.checksEKU`"
        checksSANHost:
          type: boolean
          description: "- Seealso: `Configuration.Builder.checksSANHost`"
        cipher:
          "$ref": "#/components/schemas/OpenVPN.Cipher"
          description: "- Seealso: `Configuration.Builder.cipher`"
        clientCertificate:
          "$ref": "#/components/schemas/OpenVPN.CryptoContainer"
          description: "- Seealso: `Configuration.Builder.clientCertificate`"
        clientKey:
          "$ref": "#/components/schemas/OpenVPN.CryptoContainer"
          description: "- Seealso: `Configuration.Builder.clientKey`"
        compressionAlgorithm:
          "$ref": "#/components/schemas/OpenVPN.CompressionAlgorithm"
          description: "- Seealso: `Configuration.Builder.compressionAlgorithm`"
        compressionFraming:
          "$ref": "#/components/schemas/OpenVPN.CompressionFraming"
          description: "- Seealso: `Configuration.Builder.compressionFraming`"
        dataCiphers:
          items:
            "$ref": "#/components/schemas/OpenVPN.Cipher"
          type: array
          description: "- Seealso: `Configuration.Builder.dataCiphers`"
        digest:
          "$ref": "#/components/schemas/OpenVPN.Digest"
          description: "- Seealso: `Configuration.Builder.digest`"
        dnsDomain:
          type: string
          description: "- Seealso: `Configuration.Builder.dnsDomain`"
        dnsServers:
          items:
            type: string
          type: array
          description: "- Seealso: `Configuration.Builder.dnsServers`"
        httpProxy:
          "$ref": "#/components/schemas/Endpoint"
          description: "- Seealso: `Configuration.Builder.httpProxy`"
        httpsProxy:
          "$ref": "#/components/schemas/Endpoint"
          description: "- Seealso: `Configuration.Builder.httpsProxy`"
        ipv4:
          "$ref": "#/components/schemas/IPSettings"
          description: "- Seealso: `Configuration.Builder.ipv4`"
        ipv6:
          "$ref": "#/components/schemas/IPSettings"
          description: "- Seealso: `Configuration.Builder.ipv6`"
        keepAliveInterval:
          type: number
          description: "- Seealso: `Configuration.Builder.keepAliveInterval`"
        keepAliveTimeout:
          type: number
          description: "- Seealso: `Configuration.Builder.keepAliveTimeout`"
        mtu:
          type: integer
          description: "- Seealso: `Configuration.Builder.mtu`"
        noPullMask:
          items:
            "$ref": "#/components/schemas/OpenVPN.PullMask"
          type: array
          description: "- Seealso: `Configuration.Builder.noPullMask`"
        peerId:
          "$ref": "#/components/schemas/UInt32"
          description: "- Seealso: `Configuration.Builder.peerId`"
        proxyAutoConfigurationURL:
          format: uri
          type: string
          description: "- Seealso: `Configuration.Builder.proxyAutoConfigurationURL`"
        proxyBypassDomains:
          items:
            type: string
          type: array
          description: "- Seealso: `Configuration.Builder.proxyBypassDomains`"
        randomizeEndpoint:
          type: boolean
          description: "- Seealso: `Configuration.Builder.randomizeEndpoint`"
        randomizeHostnames:
          type: boolean
          description: "- Seealso: `Configuration.Builder.randomizeHostnames`"
        remotes:
          items:
            "$ref": "#/components/schemas/ExtendedEndpoint"
          type: array
          description: "- Seealso: `Configuration.Builder.remotes`"
        renegotiatesAfter:
          type: number
          description: "- Seealso: `Configuration.Builder.renegotiatesAfter`"
        routeGateway4:
          "$ref": "#/components/schemas/Address"
          description: "- Seealso: `Configuration.Builder.routeGateway4`"
        routeGateway6:
          "$ref": "#/components/schemas/Address"
          description: "- Seealso: `Configuration.Builder.routeGateway6`"
        routes4:
          items:
            "$ref": "#/components/schemas/Route"
          type: array
          description: "- Seealso: `Configuration.Builder.routes4`"
        routes6:
          items:
            "$ref": "#/components/schemas/Route"
          type: array
          description: "- Seealso: `Configuration.Builder.routes6`"
        routingPolicies:
          items:
            "$ref": "#/components/schemas/OpenVPN.RoutingPolicy"
          type: array
          description: "- Seealso: `Configuration.Builder.routingPolicies`"
        sanHost:
          type: string
          description: "- Seealso: `Configuration.Builder.sanHost`"
        searchDomains:
          items:
            type: string
          type: array
          description: "- Seealso: `Configuration.Builder.searchDomains`"
        staticChallenge:
          type: boolean
          description: "- Seealso: `Configuration.Builder.staticChallenge`"
        tlsSecurityLevel:
          type: integer
          description: "- Seealso: `Configuration.Builder.tlsSecurityLevel`"
        tlsWrap:
          "$ref": "#/components/schemas/OpenVPN.TLSWrap"
          description: "- Seealso: `Configuration.Builder.tlsWrap`"
        usesPIAPatches:
          type: boolean
          description: "- Seealso: `Configuration.Builder.usesPIAPatches`"
        xorMethod:
          "$ref": "#/components/schemas/OpenVPN.ObfuscationMethod"
          description: "- Seealso: `Configuration.Builder.xorMethod`"
      type: object
      description: The immutable configuration for `OpenVPNSession`.
    OpenVPN.Credentials:
      additionalProperties: false
      properties:
        otp:
          type: string
          description: The OTP.
        otpMethod:
          "$ref": "#/components/schemas/OpenVPN.Credentials.OTPMethod"
          description: The OTP method (defaults to ``OTPMethod-swift.enum/none``).
        password:
          type: string
          description: The password.
        username:
          type: string
          description: The username.
      required:
        - username
        - password
        - otpMethod
      type: object
      description: A set of credentials for authentication.
    OpenVPN.Credentials.OTPMethod:
      enum:
        - none
        - append
        - encode
      type: string
      x-enum-varnames:
        - none
        - append
        - encode
    OpenVPN.CryptoContainer:
      type: string
      description: Represents a cryptographic container in PEM format.
    OpenVPN.Digest:
      enum:
        - SHA1
        - SHA224
        - SHA256
        - SHA384
        - SHA512
      type: string
      x-enum-varnames:
        - sha1
        - sha224
        - sha256
        - sha384
        - sha512
      description: Message digest algorithm.
      x-enum-descriptions:
        - SHA1 message digest.
        - SHA224 message digest.
        - SHA256 message digest.
        - SHA256 message digest.
        - SHA256 message digest.
    OpenVPN.ObfuscationMethod:
      discriminator:
        mapping:
          obfuscate: "#/components/schemas/OpenVPN.ObfuscationMethod.obfuscate"
          reverse: "#/components/schemas/OpenVPN.ObfuscationMethod.reverse"
          xormask: "#/components/schemas/OpenVPN.ObfuscationMethod.xormask"
          xorptrpos: "#/components/schemas/OpenVPN.ObfuscationMethod.xorptrpos"
        propertyName: type
      properties:
        type:
          type: string
      required:
        - type
      type: object
      description: The obfuscation method.
    OpenVPN.ObfuscationMethod.obfuscate:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/OpenVPN.ObfuscationMethod"
      properties:
        mask:
          "$ref": "#/components/schemas/SecureData"
        type:
          const: obfuscate
          type: string
      required:
        - type
        - mask
      type: object
      description: Performs several of the above steps (xormask -> xorptrpos -> reverse -> xorptrpos).
    OpenVPN.ObfuscationMethod.reverse:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/OpenVPN.ObfuscationMethod"
      properties:
        type:
          const: reverse
          type: string
      required:
        - type
      type: object
      description: Reverses the order of bytes in each buffer except for the first (abcde becomes aedcb).
    OpenVPN.ObfuscationMethod.xormask:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/OpenVPN.ObfuscationMethod"
      properties:
        mask:
          "$ref": "#/components/schemas/SecureData"
        type:
          const: xormask
          type: string
      required:
        - type
        - mask
      type: object
      description: XORs the bytes in each buffer with the given mask.
    OpenVPN.ObfuscationMethod.xorptrpos:
      additionalProperties: false
      allOf:
        - "$ref": "#/components/schemas/OpenVPN.ObfuscationMethod"
      properties:
        type:
          const: xorptrpos
          type: string
      required:
        - type
      type: object
      description: XORs each byte with its position in the packet.
    OpenVPN.PullMask:
      enum:
        - routes
        - dns
        - proxy
      type: string
      x-enum-varnames:
        - routes
        - dns
        - proxy
      description: Settings that can be pulled from server.
      x-enum-descriptions:
        - Routes and gateways.
        - DNS settings.
        - Proxy settings.
    OpenVPN.RoutingPolicy:
      enum:
        - IPv4
        - IPv6
        - blockLocal
      type: string
      x-enum-varnames:
        - IPv4
        - IPv6
        - blockLocal
      description: Routing policy.
      x-enum-descriptions:
        - All IPv4 traffic goes through the VPN.
        - All IPv6 traffic goes through the VPN.
        - Block LAN while connected.
    OpenVPN.StaticKey:
      additionalProperties: false
      properties:
        data:
          "$ref": "#/components/schemas/SecureData"
        dir:
          "$ref": "#/components/schemas/OpenVPN.StaticKey.Direction"
      required:
        - data
      type: object
      description: Represents an OpenVPN static key file (as generated with --genkey)
    OpenVPN.StaticKey.Direction:
      enum:
        - 0
        - 1
      type: integer
      x-enum-varnames:
        - server
        - client
      description: The key-direction field, usually 0 on servers and 1 on clients.
      x-enum-descriptions:
        - Conventional server direction (implicit for tls-crypt).
        - Conventional client direction (implicit for tls-crypt).
    OpenVPN.TLSWrap:
      additionalProperties: false
      properties:
        key:
          "$ref": "#/components/schemas/OpenVPN.StaticKey"
          description: The static encryption key.
        strategy:
          "$ref": "#/components/schemas/OpenVPN.TLSWrap.Strategy"
          description: The wrapping strategy.
        wrappedKey:
          "$ref": "#/components/schemas/SecureData"
          description: "The wrapped client key appended to initial tls-crypt-v2 packets."
      required:
        - strategy
        - key
      type: object
      description: Holds parameters for TLS wrapping.
    OpenVPN.TLSWrap.Strategy:
      enum:
        - auth
        - crypt
        - "crypt-v2"
      type: string
      x-enum-varnames:
        - auth
        - crypt
        - cryptV2
      description: The wrapping strategy.
      x-enum-descriptions:
        - Authenticates payload (--tls-auth).
        - Encrypts payload (--tls-crypt).
        - "Encrypts payload with a client-specific key (--tls-crypt-v2)."
    OpenVPNModule:
      additionalProperties: false
      properties:
        configuration:
          "$ref": "#/components/schemas/OpenVPN.Configuration"
        credentials:
          "$ref": "#/components/schemas/OpenVPN.Credentials"
        id:
          "$ref": "#/components/schemas/UniqueID"
        requiresInteractiveCredentials:
          type: boolean
      required:
        - id
      type: object
      description: A connection module providing an OpenVPN connection.
    PartoutErrorCode:
      enum:
        - cached
        - notFound
        - operationCancelled
        - releasedObject
        - scriptException
        - timeout
        - unhandled
        - incompatibleModules
        - incompleteModule
        - noActiveModules
        - nonFinalModules
        - requiredImplementation
        - unexpectedModuleType
        - unknownImportedModule
        - unknownModuleHandler
        - authentication
        - crypto
        - dnsFailure
        - exhaustedEndpoints
        - fdUnavailable
        - ioFailure
        - linkNotActive
        - networkChanged
        - networkUnreachable
        - socketConfiguration
        - tunNotActive
        - tunNotAvailable
        - decoding
        - encoding
        - invalidField
        - invalidValue
        - parsing
        - keychainAddItem
        - keychainItemNotFound
        - OpenVPN.compressionMismatch
        - OpenVPN.connectionFailure
        - OpenVPN.noRouting
        - OpenVPN.otpRequired
        - OpenVPN.passphraseRequired
        - OpenVPN.recoverableAuthentication
        - OpenVPN.serverShutdown
        - OpenVPN.tlsFailure
        - OpenVPN.unsupportedAlgorithm
        - OpenVPN.unsupportedCompression
        - OpenVPN.unsupportedOption
        - WireGuard.emptyPeers
      type: string
      x-enum-varnames:
        - cached
        - notFound
        - operationCancelled
        - releasedObject
        - scriptException
        - timeout
        - unhandled
        - incompatibleModules
        - incompleteModule
        - noActiveModules
        - nonFinalModules
        - requiredImplementation
        - unexpectedModuleType
        - unknownImportedModule
        - unknownModuleHandler
        - authentication
        - crypto
        - dnsFailure
        - exhaustedEndpoints
        - fdUnavailable
        - ioFailure
        - linkNotActive
        - networkChanged
        - networkUnreachable
        - socketConfiguration
        - tunNotActive
        - tunNotAvailable
        - decoding
        - encoding
        - invalidField
        - invalidValue
        - parsing
        - keychainAddItem
        - keychainItemNotFound
        - openVPNCompressionMismatch
        - openVPNConnectionFailure
        - openVPNNoRouting
        - openVPNOTPRequired
        - openVPNPassphraseRequired
        - openVPNRecoverableAuthentication
        - openVPNServerShutdown
        - openVPNTLSFailure
        - openVPNUnsupportedAlgorithm
        - openVPNUnsupportedCompression
        - openVPNUnsupportedOption
        - wireGuardEmptyPeers
      x-enum-descriptions:
        - Response is cached.
        - Entity not found.
        - Operation cancelled or unauthorized.
        - A required object was released prematurely.
        - An exception was raised during a script execution.
        - Operation timed out.
        - Generic failure.
        - Some modules are incompatible (`userInfo` is an array of incompatible ``Module``).
        - A module is incomplete (`userInfo` is the incomplete ``ModuleBuilder`` ID).
        - The profile has no active modules.
        - The profile has non-final modules that must be resolved to final modules first.
        - Missing a required implementation.
        - Module type is unexpected
        - Module content is unknown for the importer.
        - Module handler is unknown.
        - Authentication failure.
        - Crypto error.
        - DNS resolution failure.
        - No more endpoints available to try.
        - File descriptor is not available.
        - I/O failure.
        - Link device is not active.
        - Network changed.
        - Network is unreachable.
        - Native sockets could not be configured.
        - TUN device is not active.
        - TUN device is not available for I/O.
        - Decoding error.
        - Encoding error.
        - Invalid field.
        - Invalid value.
        - Parsing error.
        - Unable to add keychain item.
        - Keychain item not found.
        - Compression settings mismatch.
        - Connection failure.
        - No routing configuration.
        - One-time password is required.
        - Passphrase is required.
        - Authentication can be retried.
        - Server requested shutdown.
        - TLS failure.
        - Algorithm is unsupported.
        - Compression setting is unsupported.
        - Option is unsupported.
        - Configuration has no peers.
    ProfileBehavior:
      additionalProperties: false
      properties:
        disconnectsOnSleep:
          type: boolean
          description: Disconnects when the device goes to sleep.
        includesAllNetworks:
          type: boolean
          description: Attempts to route as much traffic as possible through the tunnel.
      required:
        - disconnectsOnSleep
      type: object
      description: Advanced flags affecting the behavior of a ``Profile``.
    Route:
      additionalProperties: false
      properties:
        destination:
          "$ref": "#/components/schemas/Subnet"
          description: The destination subnet or `nil` if default.
        gateway:
          "$ref": "#/components/schemas/Address"
          description: The address of the gateway (falls back to global gateway).
      type: object
      description: Represents a route in the routing table.
    SecureData:
      type: string
      description: Wrapper of a byte array with safe encoding capabilities.
    SocketType:
      enum:
        - UDP
        - TCP
      type: string
      x-enum-varnames:
        - udp
        - tcp
      description: A socket type between UDP and TCP.
