name: Windows Build

on:
  workflow_dispatch:

jobs:
  build_windows:
    name: Windows x64 build (library)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3-release
          swift-build: 6.3-RELEASE

      - name: Configure, build, and verify (library only, vendors disabled)
        shell: pwsh
        run: pwsh -File ./ci/build-windows.ps1
